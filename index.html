<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root{
    --vinho:#7d2e46; --vinho-escuro:#5a1f31; --vinho-claro:#9e3a58;
    --creme:#faf6f0; --creme-medio:#f0e8df; --creme-escuro:#e0d0c3;
    --texto:#2c1a22; --texto-suave:#7a5c68; --branco:#ffffff;
    --verde:#4a7c5f; --alerta:#c0392b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--creme);
    font-family:Georgia,'Times New Roman',serif; color:var(--texto);
  }
  .sans{font-family:-apple-system,Segoe UI,Roboto,sans-serif;}
  header{
    background:var(--vinho); color:#fff; padding:16px 24px;
    display:flex; align-items:center; justify-content:space-between;
    box-shadow:0 2px 12px rgba(125,46,70,.3); flex-wrap:wrap; gap:10px;
  }
  .logo{font-size:21px;font-weight:bold;}
  .logo-sub{font-family:-apple-system,Segoe UI,Roboto,sans-serif;font-size:11px;opacity:.75;letter-spacing:1px;text-transform:uppercase;}
  header nav{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  button, .btn{
    font-family:-apple-system,Segoe UI,Roboto,sans-serif; font-weight:600;
    cursor:pointer; border-radius:6px; border:none; font-size:14px;
    padding:9px 18px; background:var(--vinho); color:#fff;
  }
  button:hover{filter:brightness(1.08);}
  button:disabled{opacity:.6;cursor:not-allowed;}
  .btn-outline{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.5);}
  .btn-outline-vinho{background:transparent;color:var(--vinho);border:2px solid var(--vinho);}
  .btn-danger{background:var(--alerta);color:#fff;padding:7px 14px;font-size:13px;}
  .btn-small{padding:7px 14px;font-size:13px;}
  .container{max-width:900px;margin:0 auto;padding:32px 16px;}
  .container-sm{max-width:460px;margin:0 auto;padding:32px 16px;}
  .card{
    background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(125,46,70,.1);
    padding:26px;margin-bottom:20px;
  }
  label.field-label{
    display:block;font-family:-apple-system,Segoe UI,Roboto,sans-serif;
    font-size:12px;font-weight:700;color:var(--texto-suave);
    text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;
  }
  input[type=text],input[type=email],input[type=password],input[type=datetime-local],input[type=number]{
    width:100%;padding:11px 13px;border:1.5px solid var(--creme-escuro);
    border-radius:7px;font-size:15px;font-family:-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--creme);color:var(--texto);outline:none;
  }
  .badge{
    display:inline-block;border-radius:20px;padding:3px 12px;font-size:12px;
    font-family:-apple-system,Segoe UI,Roboto,sans-serif;font-weight:700;color:#fff;letter-spacing:.3px;
  }
  .badge-ok{background:var(--verde);} .badge-warn{background:var(--alerta);}
  .badge-vinho{background:var(--vinho);} .badge-muted{background:var(--texto-suave);}
  .tabs{display:flex;border-bottom:2px solid var(--creme-medio);margin-bottom:22px;}
  .tab{
    flex:1;background:none;border:none;padding:10px;cursor:pointer;
    font-family:-apple-system,Segoe UI,Roboto,sans-serif;font-weight:700;font-size:14px;
    color:var(--texto-suave);border-bottom:3px solid transparent;margin-bottom:-2px;
    text-transform:uppercase;letter-spacing:.5px;
  }
  .tab.active{color:var(--vinho);border-bottom-color:var(--vinho);}
  .err-msg{color:var(--alerta);font-family:-apple-system,Segoe UI,Roboto,sans-serif;font-size:13px;margin-bottom:14px;}
  .grid-photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;}
  .photo-card{border-radius:8px;overflow:hidden;border:1.5px solid var(--creme-escuro);background:#fff;}
  .photo-card img{width:100%;height:160px;object-fit:cover;display:block;cursor:zoom-in;}
  .photo-card .pad{padding:10px 10px 12px;}
  .upload-box{
    display:block;border:2px dashed var(--creme-escuro);border-radius:8px;padding:26px;
    text-align:center;cursor:pointer;background:var(--creme-medio);
  }
  .toast{
    position:fixed;top:20px;right:20px;z-index:9999;color:#fff;padding:13px 20px;
    border-radius:8px;font-family:-apple-system,Segoe UI,Roboto,sans-serif;font-size:14px;
    font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.2);max-width:300px;
    display:none;
  }
  .vote-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px;}
  .vote-photo-wrap{position:relative;}
  .vote-photo-wrap img{width:100%;height:190px;object-fit:cover;display:block;cursor:zoom-in;}
  .vote-count{
    position:absolute;top:10px;right:10px;background:rgba(0,0,0,.6);color:#fff;
    border-radius:20px;padding:3px 10px;font-family:-apple-system,Segoe UI,Roboto,sans-serif;
    font-size:12px;font-weight:700;
  }
  .own-badge{position:absolute;top:10px;left:10px;}
  .zoom-hint{
    position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;
    border-radius:6px;padding:3px 8px;font-family:-apple-system,Segoe UI,Roboto,sans-serif;
    font-size:11px;pointer-events:none;
  }
  .vote-info{padding:13px 15px;}
  .vote-title{font-weight:bold;margin-bottom:3px;font-size:15px;}
  .vote-author{font-family:-apple-system,Segoe UI,Roboto,sans-serif;font-size:12px;color:var(--texto-suave);margin-bottom:11px;}
  .vote-btn{width:100%;font-weight:700;border:1.5px solid var(--vinho);}
  .vote-btn.voted{background:var(--vinho);color:#fff;}
  .vote-btn.not-voted{background:var(--creme-medio);color:var(--vinho);}
  .result-row{display:flex;border-radius:12px;overflow:hidden;box-shadow:0 2px 16px rgba(125,46,70,.1);background:#fff;margin-bottom:14px;}
  .result-row img{width:140px;height:120px;object-fit:cover;flex-shrink:0;cursor:zoom-in;}
  .result-info{padding:14px 18px;flex:1;display:flex;align-items:center;justify-content:space-between;}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
  .stat-box{background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(125,46,70,.1);padding:20px;text-align:center;}
  .stat-num{font-size:28px;font-weight:bold;color:var(--vinho);}
  .stat-label{font-family:-apple-system,Segoe UI,Roboto,sans-serif;font-size:12px;color:var(--texto-suave);}
  .row-flex{display:flex;justify-content:space-between;align-items:center;padding:11px 15px;background:var(--creme-medio);border-radius:8px;margin-bottom:9px;flex-wrap:wrap;gap:8px;}
  .loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:var(--texto-suave);}
  .config-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
  @media(max-width:640px){
    .config-grid{grid-template-columns:1fr;}
    .result-row{flex-direction:column;}
    .result-row img{width:100%;height:140px;}
  }
  .hidden{display:none !important;}

  /* ─── LIGHTBOX (pop-up de foto ampliada) ─── */
  .lightbox-overlay{
    position:fixed;inset:0;background:rgba(20,8,12,.92);z-index:99999;
    display:flex;align-items:center;justify-content:center;padding:20px;
    animation:fadeIn .15s ease;
  }
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .lightbox-img{
    max-width:100%;max-height:88vh;object-fit:contain;border-radius:6px;
    box-shadow:0 10px 50px rgba(0,0,0,.5);
  }
  .lightbox-close{
    position:absolute;top:18px;right:22px;background:rgba(255,255,255,.15);
    color:#fff;border:none;width:42px;height:42px;border-radius:50%;
    font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  .lightbox-close:hover{background:rgba(255,255,255,.3);}
  .lightbox-caption{
    position:absolute;bottom:18px;left:0;right:0;text-align:center;color:#fff;
    font-family:-apple-system,Segoe UI,Roboto,sans-serif;font-size:14px;
  }
</style>
</head>
<body>

<div id="toast" class="toast"></div>
<div id="root"><div class="loading-screen">Carregando...</div></div>

<script src="app.js"></script>
</body>
</html>
